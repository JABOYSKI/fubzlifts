<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <title>FubzLifts</title>
  <meta name="description" content="FubzLifts â€” a real-time group StrongLifts 5Ã—5 tracker for 2â€“4 lifters sharing a barbell rack."/>
  <link rel="stylesheet" href="css/styles.css?v=2026-04-30T16:02:25Z"/>
  <link rel="manifest" href="manifest.json"/>
  <meta name="theme-color" content="#232F3E"/>
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png"/>
  <link rel="apple-touch-icon" href="icons/icon-192.png"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <!-- Inline boot styles so the loading overlay paints instantly, before
       the external stylesheet is fetched. Avoids any flash of dark page. -->
  <style>
    body { margin: 0; background: #131921; color: #F0F2F2; }
    #bootSplash {
      position: fixed; inset: 0; z-index: 9999;
      background: #131921;
      display: flex; align-items: center; justify-content: center;
      transition: opacity 0.35s ease;
    }
    #bootSplash.hide { opacity: 0; pointer-events: none; }
    .boot-spinner { position: relative; width: 110px; height: 110px; }
    .boot-ring {
      position: absolute; inset: 0; border-radius: 50%;
      border: 3px solid rgba(255, 153, 0, 0.18);
      border-top-color: #FF9900;
      animation: bootSpin 1.1s linear infinite;
    }
    .boot-logo {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 80px; height: 80px; border-radius: 50%; object-fit: cover;
    }
    @keyframes bootSpin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <!-- Boot loading overlay â€” visible by default, hidden by JS once init
       completes. Re-shown by invisibleReload() and the SW update handler
       to mask the reload itself, so the user sees one continuous loading
       state instead of a fade-to-black flash. -->
  <div id="bootSplash">
    <div class="boot-spinner">
      <div class="boot-ring"></div>
      <img src="icons/icon-192.png" alt="" class="boot-logo" />
    </div>
  </div>

  <!-- Reusable SVG symbols. Hidden but referenced via <use> elsewhere. -->
  <svg style="position:absolute;width:0;height:0;overflow:hidden" aria-hidden="true">
    <symbol id="icon-paw" viewBox="0 0 100 100">
      <ellipse cx="50" cy="68" rx="24" ry="22"/>
      <ellipse cx="22" cy="38" rx="8" ry="12" transform="rotate(-20 22 38)"/>
      <ellipse cx="40" cy="22" rx="7" ry="11" transform="rotate(-8 40 22)"/>
      <ellipse cx="60" cy="22" rx="7" ry="11" transform="rotate(8 60 22)"/>
      <ellipse cx="78" cy="38" rx="8" ry="12" transform="rotate(20 78 38)"/>
    </symbol>
  </svg>

  <!-- Pip strip showing 6th-set vote progress. Hidden when no vote active.
       JS toggles .visible and populates dots in renderSession. -->
  <div id="pawPips" class="paw-pips" hidden></div>

  <!-- Header -->
  <header>
    <div class="row">
      <div class="logo" id="headerLogo" style="cursor:pointer;display:flex;align-items:center;gap:8px;min-width:0;flex-shrink:1;overflow:hidden"><img src="icons/icon-192.png" alt="" style="width:60px;height:60px;border-radius:50%;object-fit:cover;flex-shrink:0;transform:translateZ(0)"><span style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">FubzLifts</span></div>
      <div class="header-spacer"></div>
      <div id="headerRight" style="display:none;align-items:center;gap:8px">
        <span class="header-alias" id="headerAlias" style="cursor:pointer"></span>
      </div>
    </div>
  </header>

  <!-- Main Content Area -->
  <main class="container">
    <!-- Auth View -->
    <div id="authView" class="view active"></div>

    <!-- Groups View -->
    <div id="groupsView" class="view"></div>

    <!-- Session View -->
    <div id="sessionView" class="view"></div>

    <!-- Profile View -->
    <div id="profileView" class="view"></div>
  </main>

  <!-- Bottom Navigation -->
  <nav class="nav-bar" id="navBar" style="display:none">
    <button class="nav-tab active" data-page="groups">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
        <circle cx="9" cy="7" r="4"/>
        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
      </svg>
      Groups
    </button>
    <button class="nav-tab" data-page="profile">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      Profile
    </button>
  </nav>

  <!-- Toast -->
  <div id="toast"></div>

  <!-- App Script. The version query string is replaced at deploy time by
       deploy.bat â€” every deploy produces a unique URL the browser must
       fetch fresh, sidestepping HTTP cache TTLs that would otherwise serve
       stale JS for up to 10 minutes after a deploy. -->
  <script type="module" src="js/app.js?v=2026-04-30T16:02:25Z"></script>

  <!-- Build timestamp also inlined here so the splash's "updated" line is
       guaranteed fresh per deploy without depending on version.js (which
       ES-module imports inside app.js can't easily cache-bust). -->
  <script>window.FUBZ_BUILD_TIME = '2026-04-30T16:02:25Z';</script>

  <!-- Service Worker Registration + Auto-update listener -->
  <script>
    if ('serviceWorker' in navigator) {
      let refreshing = false;
      navigator.serviceWorker.addEventListener('message', e => {
        if (e.data && e.data.type === 'SW_UPDATED' && !refreshing) {
          // Same anti-loop guard as invisibleReload() in app.js â€” if anything
          // reloaded the page in the last 30s, don't reload again. Stops the
          // SW activate â†’ reload â†’ SW activate again cascade if the SW bytes
          // appear unstable to the browser.
          var last = parseInt(sessionStorage.getItem('fubz_last_reload') || '0', 10);
          if (Date.now() - last < 30 * 1000) return;
          refreshing = true;
          sessionStorage.setItem('fubz_last_reload', String(Date.now()));
          // Re-show the boot loader so the impending reload looks like a
          // continuous loading state, not a fade-to-black flash.
          document.getElementById('bootSplash')?.classList.remove('hide');
          setTimeout(() => window.location.reload(), 350);
        }
      });
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js', { updateViaCache: 'none' })
          .then(reg => reg.update())
          .catch(() => {});
      });
    }
  </script>
</body>
</html>
